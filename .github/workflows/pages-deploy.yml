name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Cache linkpreview data
        uses: actions/cache@v4
        with:
          path: _cache
          key: linkpreview-${{ hashFiles('_posts/**') }}
          restore-keys: |
            linkpreview-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed posts
        id: changed
        run: |
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(find _posts -name '*.md')
          else
            CHANGED_FILES=$(git diff HEAD~1 HEAD --name-only --diff-filter=ACM -- '_posts/*.md')
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No post changes - skipping IndexNow"
            echo "has_urls=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          URLS=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            SLUG=$(basename "$file" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
            URLS+=("https://tnttntttn.github.io/posts/$SLUG/")
          done <<< "$CHANGED_FILES"

          JOINED=$(printf '"%s",' "${URLS[@]}")
          URL_ARRAY="[${JOINED%,}]"
          echo "url_array=$URL_ARRAY" >> $GITHUB_OUTPUT
          echo "has_urls=true" >> $GITHUB_OUTPUT
          echo "Submitting: $URL_ARRAY"

      - name: Notify Bing via IndexNow
        if: steps.changed.outputs.has_urls == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"tnttntttn.github.io\",
              \"key\": \"${INDEXNOW_KEY}\",
              \"keyLocation\": \"https://tnttntttn.github.io/${INDEXNOW_KEY}.txt\",
              \"urlList\": ${{ steps.changed.outputs.url_array }}
            }")
          echo "IndexNow HTTP $HTTP_STATUS"
          [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "202" ]] || exit 1
